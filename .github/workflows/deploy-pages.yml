name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest 
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      # Project repos default to basePath=/repo so https://user.github.io/repo/ works.
      # Custom domains are served at the domain root — use either repository variable
      # PAGES_AT_ROOT=true or commit an empty marker: .github/pages-at-root
      - name: Set base path for GitHub Pages
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          if [ -f .github/pages-at-root ] || [ "${{ vars.PAGES_AT_ROOT }}" = "true" ]; then
            echo "Root build (pages-at-root file or PAGES_AT_ROOT): no basePath"
          elif [ "$REPO" = "$OWNER.github.io" ]; then
            echo "User or organization site: site root"
          else
            echo "NEXT_BASE_PATH=/$REPO" >> "$GITHUB_ENV"
            echo "Project site: base path /$REPO"
          fi

      - run: npm ci

      # Inherit NEXT_BASE_PATH from the step above (GITHUB_ENV); ${{ env.NEXT_BASE_PATH }} is always empty here.
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
